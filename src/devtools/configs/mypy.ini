# configs/mypy.ini  — shared mypy config
# Consuming repos reference this via:
#   mypy --config-file path/to/configs/mypy.ini .
# Or use the `dev-check` CLI wrapper which passes it automatically.

[mypy]
python_version = 3.11
strict = true

# Cleaner output
show_error_codes = true
pretty = true

# Don't fail on missing stubs for third-party libs
ignore_missing_imports = true

# Allow re-exports (common in __init__.py files)
implicit_reexport = true

# Per-module overrides — add more as needed
[mypy-tests.*]
disallow_untyped_defs = false
